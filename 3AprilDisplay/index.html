<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>April Display</h1>
    <h1>Display : None</h1>
    <div>
        <!-- Here is a function disable as none -->
        <p class="ex1">Hello Display none</p>

    </div>
    
    <h1>Display : Block</h1>
    <div>
       <!-- It is similar like div container -->
        <p class="ex1">Hello Display block</p>

    </div>
    <h1>Display : Inline</h1>
    <div>
        <!-- Here is a function display as Inline, it will not start a new line and it will only take the width of the content inside it. -->
        <p class="ex1">Hello Display Inline</p>

    </div>
</body>
