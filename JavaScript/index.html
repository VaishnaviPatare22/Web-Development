<!DOCTYPE html>

</head>
<body>
     <script>
        // Disadvantage of var - It can allows same value for one variable and it can be reassign value to the same variable
        var userName = "Pune"
        console.log(userName)

        var age = 25;
        console.log(age)

        //2. keyword - let - It can not allows same value for one variable
        let email = "pune@example.com"
        // let email = "xyz@example.com" Not Allowed
        console.log(email)
        //Disadvanage of let - 
        let review = 4.5
        review = 4.8  //By default data type is var but we can change it by using let and const
        console.log(review)

        //3. Keyword - Const - fixed
        const abc = "Hello"
        // abc = "Good Morning" // Not Allowed
        console.log(abc)

    </script>
</body>
</html>
