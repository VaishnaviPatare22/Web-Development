<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //loop should be ending everything
        

        //for loop : 
        //For(starting point; ending point; increment- ++ /decrement- --) - keyword
        //Task - Print numbers 1 to 100
        for(let i=1; i<11; i++){
            //Repeated tasks
            console.log("The value of i is: "+i)
        }
        //When have clear information about starting and ending point then we can use for loop

        //While loop : entry controlled loop
        //While(condition) - keyword : When condition is true then loop starts and when ondition becomes false loop stopped
        let count = 0;
        while(count<5){
            console.log("Hii I am inside while loop")
            count++ // Important: Update the counter to avoid infinite loop
        }

        //Do-While loop : exit controlled loop
        //It will execute / run the code at least once even if the condition is false
        let num = 7;
        do{
            console.log("Hii I am inside do-while loop")
            num++
        } while(num<5)
        </script>
</body>
</html>
