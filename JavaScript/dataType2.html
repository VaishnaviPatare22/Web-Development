<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Array - It is used to store multiple data/value at the same type 
        //Advantage in JS Array- Can of different datattypes together
        //Symbol - [ ] 

        //Rules - Index No start with 0
        var students = ["Vaishnavi", "Rohini", "Piyush", "Kunal", "Anshika"]
        console.log(students)

        //Access a single data from array - students[index no]
        console.log(students[2]) //Piyush
        console.log(students[0]) //Vaishnavi
        console.log(students[4]) //Anshika


    </script>
</body>
</html>
