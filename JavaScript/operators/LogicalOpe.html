<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
// AND Operator && : Both conditions must be true for the result to be true
var isMember = true;
let totalPurchase = 150;

console.log(isMember && totalPurchase > 500)

//OR Operator || : At least one condition must be true for the result to be true
console.log(isMember || totalPurchase > 500)

//Negation - ! : Opposite values
let netflixSubscription = true;
console.log(!netflixSubscription)

//Comparison Operators : Two values
const a = 10
const b = "10"
//== : Checks for value equality (type coercion)
console.log(a == b) //true

//=== : Checks for value and type equality (strict equality)
console.log(a === b) //false
</script>

</body>
</html>
