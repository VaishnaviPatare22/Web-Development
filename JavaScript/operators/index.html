<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Arithmetic operators - + / * %
        var x = 10
        var y = 20

        console.log(x + y) //30
        console.log(x - y) //-10    
        console.log(x / y) //0.5
        console.log(x * y) //200
        console.log(x % y) //10
        
    </script>
</body>
</html>
